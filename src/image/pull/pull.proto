syntax = "proto3";

package dp.sdk.image.pull;

option go_package = "github.com/dpanel-cn/proto/gen/image/pull;pull";

import "google/protobuf/struct.proto";

message Request {
  string reference = 1;
  bool all = 2;
  google.protobuf.Value registry_auth = 3;
  string platform = 4;
  int64 limit_bytes = 5;
}

message Response {
  bytes raw_json = 1;
}
