syntax = "proto3";

package dp.sdk.image.list;

option go_package = "github.com/dpanel-cn/proto/gen/image/list;list";

import "google/protobuf/struct.proto";

message Request {
  bool all = 1;
  bool shared_size = 2;
  bool manifests = 3;
  google.protobuf.Struct filters = 4;
}

message Response {
  bytes raw_json = 1;
}
