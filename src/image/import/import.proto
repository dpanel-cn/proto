syntax = "proto3";

package dp.sdk.image.import;

option go_package = "github.com/dpanel-cn/proto/gen/image/import;imageimport";

message Request {
  string source_name = 1;
  string source_base64 = 2;
  string reference = 3;
  string tag = 4;
  string message = 5;
  repeated string changes = 6;
  string platform = 7;
  int64 limit_bytes = 8;
}

message Response {
  bytes raw_json = 1;
}
