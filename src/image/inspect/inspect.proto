syntax = "proto3";

package dp.sdk.image.inspect;

option go_package = "github.com/dpanel-cn/proto/gen/image/inspect;inspect";

import "google/protobuf/struct.proto";

message Request {
  string id = 1;
  bool raw = 2;
  bool manifests = 3;
  google.protobuf.Struct platform = 4;
}

message Response {
  bytes raw_json = 1;
}
