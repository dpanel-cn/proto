syntax = "proto3";

package dp.sdk.container.export;

option go_package = "github.com/dpanel-cn/proto/gen/container/export;export";

message Request {
  string id = 1;
  int64 limit_bytes = 2;
}

message Response {
  string id = 1;
  string archive_base64 = 2;
  int64 archive_bytes = 3;
  bool truncated = 4;
}
