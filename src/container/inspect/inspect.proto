syntax = "proto3";

package dp.sdk.container.inspect;

option go_package = "github.com/dpanel-cn/proto/gen/container/inspect;inspect";

message Request {
  string id = 1;
  bool size = 2;
}

message Response {
  bytes raw_json = 1;
  string id = 2;
  string name = 3;
  string image = 4;
  string state = 5;
}
